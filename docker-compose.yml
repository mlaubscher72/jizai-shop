services:
  jizai-shop:
    build: .
    container_name: jizai-shop
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    volumes:
      # Persistiert den Demo-Speicher über Container-Neustarts (ohne Supabase)
      - jizai-data:/app/data

volumes:
  jizai-data:
