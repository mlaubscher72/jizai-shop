# ── Nginx Reverse Proxy für JIZAI Shop ──────────────────────
# Auf dem VPS nach /etc/nginx/sites-available/jizai kopieren,
# Domain anpassen, dann:
#   ln -s /etc/nginx/sites-available/jizai /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# SSL danach mit: certbot --nginx -d jizai.ch -d www.jizai.ch

server {
    listen 80;
    listen [::]:80;
    server_name jizai.ch www.jizai.ch;

    # Max. Upload (Admin-Formulare)
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Statische Next.js-Assets aggressiv cachen
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
